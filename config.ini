# Network Gamepad Interface Configuration

[server]
# Server network settings
host = 0.0.0.0
port = 9999
log_level = INFO

# Virtual device settings
device_name = Network Gamepad Interface
vendor_id = 0x046d
product_id = 0xc262

[client]
# Client network settings
server_host = localhost
server_port = 9999
log_level = INFO

# Update rate (Hz)
update_rate = 60

# Gamepad settings
device_name = Logitech G920 Driving Force Racing Wheel
force_feedback_enabled = true

[gamepad_mappings]
# Logitech G920 axis mappings
steering_axis = 0
throttle_axis = 2
brake_axis = 3
clutch_axis = 1

# Button mappings for gear shifter
reverse_button = 4
gear_1_button = 5
gear_2_button = 6
gear_3_button = 7
gear_4_button = 8
gear_5_button = 9
gear_6_button = 10
